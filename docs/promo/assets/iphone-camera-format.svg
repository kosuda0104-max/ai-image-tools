<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" role="img" aria-labelledby="t">
  <title id="t">iPhoneの設定→カメラ→フォーマットで「互換性優先」を選ぶイメージ</title>
  <style>text { font-family: ui-sans-serif, system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif; }</style>
  <rect x="2" y="2" width="756" height="326" rx="18" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>

  <rect x="200" y="30" width="360" height="270" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="380" y="68" text-anchor="middle" font-size="15" font-weight="800" fill="#1e293b">設定 → カメラ → フォーマット</text>
  <line x1="224" y1="86" x2="536" y2="86" stroke="#eef2f7" stroke-width="2"/>

  <rect x="224" y="104" width="312" height="52" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="244" y="136" font-size="15" fill="#334155">高効率（HEIC）</text>
  <circle cx="512" cy="130" r="11" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <rect x="224" y="168" width="312" height="52" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="244" y="200" font-size="15" font-weight="700" fill="#065f46">互換性優先（JPEG）</text>
  <circle cx="512" cy="194" r="12" fill="#10b981"/>
  <text x="512" y="199" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">✓</text>

  <text x="380" y="258" text-anchor="middle" font-size="12" fill="#64748b">「互換性優先」を選ぶと、以後の撮影はJPEGで保存されます</text>
  <text x="380" y="282" text-anchor="middle" font-size="12" fill="#94a3b8">※すでに撮った HEIC 写真は変換が必要</text>
</svg>

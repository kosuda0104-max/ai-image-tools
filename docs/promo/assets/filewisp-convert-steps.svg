<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 230" role="img" aria-labelledby="t">
  <title id="t">Filewispでの変換3ステップ：ドロップ→形式を選ぶ→ダウンロード</title>
  <style>text { font-family: ui-sans-serif, system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif; }</style>
  <rect x="2" y="2" width="756" height="226" rx="18" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="380" y="38" text-anchor="middle" font-size="16" font-weight="800" fill="#1e293b">Filewisp なら3ステップ</text>

  <!-- Card 1 -->
  <g>
    <rect x="40" y="62" width="210" height="120" rx="16" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
    <circle cx="74" cy="96" r="15" fill="#6366f1"/>
    <text x="74" y="101" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">1</text>
    <text x="145" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">ドロップ</text>
    <text x="145" y="156" text-anchor="middle" font-size="14" font-weight="800" fill="#10b981">.heic を入れる</text>
  </g>
  <g transform="translate(252,122)"><line x1="0" y1="0" x2="18" y2="0" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/><path d="M14 -6 L26 0 L14 6 Z" fill="#94a3b8"/></g>

  <!-- Card 2 -->
  <g>
    <rect x="275" y="62" width="210" height="120" rx="16" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
    <circle cx="309" cy="96" r="15" fill="#6366f1"/>
    <text x="309" y="101" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">2</text>
    <text x="380" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">形式を選ぶ</text>
    <text x="380" y="156" text-anchor="middle" font-size="14" font-weight="600" fill="#64748b">JPG または PNG</text>
  </g>
  <g transform="translate(487,122)"><line x1="0" y1="0" x2="18" y2="0" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/><path d="M14 -6 L26 0 L14 6 Z" fill="#94a3b8"/></g>

  <!-- Card 3 -->
  <g>
    <rect x="510" y="62" width="210" height="120" rx="16" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
    <circle cx="544" cy="96" r="15" fill="#6366f1"/>
    <text x="544" y="101" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">3</text>
    <text x="615" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">ダウンロード</text>
    <text x="615" y="156" text-anchor="middle" font-size="14" font-weight="800" fill="#f97316">.jpg を保存</text>
  </g>
</svg>

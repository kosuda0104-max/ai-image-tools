<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="t">
  <title id="t">Windowsで .heic を開こうとして「このファイルは開けません」と表示されるイメージ</title>
  <style>text { font-family: ui-sans-serif, system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif; }</style>
  <rect x="2" y="2" width="756" height="296" rx="18" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>

  <rect x="200" y="44" width="360" height="212" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="224" y="78" font-size="15" font-weight="700" fill="#334155">写真.heic</text>
  <text x="534" y="79" font-size="16" fill="#94a3b8">✕</text>
  <line x1="200" y1="94" x2="560" y2="94" stroke="#eef2f7" stroke-width="2"/>

  <circle cx="262" cy="156" r="27" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="262" y="166" text-anchor="middle" font-size="28" font-weight="800" fill="#ef4444">✕</text>

  <text x="306" y="148" font-size="16" font-weight="700" fill="#1e293b">このファイルは開けません</text>
  <text x="306" y="174" font-size="13" fill="#64748b">対応するアプリがインストールされていません</text>

  <rect x="462" y="210" width="84" height="32" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="504" y="231" text-anchor="middle" font-size="13" font-weight="600" fill="#64748b">OK</text>
</svg>
